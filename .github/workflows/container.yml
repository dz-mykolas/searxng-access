name: Test and publish container

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            libffi-dev \
            libssl-dev \
            libxml2-dev \
            libxslt1-dev \
            python3-venv

      - name: Set up plugin and pinned SearXNG
        run: make setup

      - name: Check lockfile
        run: uv lock --check

      - name: Lint and test
        run: |
          make lint
          make test
          make test-integration

  container-check:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    needs: test
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build container
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./Containerfile
          tags: searxng-access:ci
          platforms: linux/amd64
          load: true
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test container
        env:
          SMOKE_TOKEN: container-smoke-token
        run: |
          docker run --detach \
            --name searxng-access-smoke \
            --publish 127.0.0.1:18080:8080 \
            --env SEARXNG_ACCESS_DEV_TOKEN="$SMOKE_TOKEN" \
            --env SEARXNG_ACCESS_SECURE_COOKIE=false \
            searxng-access:ci
          trap 'docker rm --force searxng-access-smoke >/dev/null 2>&1 || true' EXIT

          for attempt in {1..60}; do
            status=$(curl --silent --output /dev/null --write-out '%{http_code}' \
              http://127.0.0.1:18080/healthz || true)
            if [ "$status" = 200 ]; then
              break
            fi
            if [ "$attempt" = 60 ]; then
              docker logs searxng-access-smoke
              exit 1
            fi
            sleep 1
          done

          missing_status=$(curl --silent --output /dev/null --write-out '%{http_code}' \
            http://127.0.0.1:18080/config)
          api_key_status=$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --header "X-API-Key: $SMOKE_TOKEN" \
            http://127.0.0.1:18080/config)
          bearer_status=$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --header "Authorization: Bearer $SMOKE_TOKEN" \
            http://127.0.0.1:18080/config)
          test "$missing_status" = 401
          test "$api_key_status" = 200
          test "$bearer_status" = 200

          limited_token=$(docker exec searxng-access-smoke \
            searxng-access token create \
              --label smoke-test \
              --capability search \
              --limit 1 \
              --window 60 \
            | awk '$1 == "Token:" { print $2 }')
          test -n "$limited_token"
          first_status=$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --header "X-API-Key: $limited_token" \
            http://127.0.0.1:18080/)
          quota_headers=$(mktemp)
          second_status=$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --dump-header "$quota_headers" \
            --header "X-API-Key: $limited_token" \
            http://127.0.0.1:18080/)
          if [ "$second_status" = 200 ]; then
            second_status=$(curl --silent --output /dev/null --write-out '%{http_code}' \
              --dump-header "$quota_headers" \
              --header "X-API-Key: $limited_token" \
              http://127.0.0.1:18080/)
          fi
          test "$first_status" = 200
          test "$second_status" = 429
          tr -d '\r' < "$quota_headers" | grep --extended-regexp --quiet \
            '^Retry-After: [1-9][0-9]*$'

  publish:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: test
    runs-on: ubuntu-24.04
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Verify release tag matches package version
        run: |
          package_version=$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          test "v${package_version}" = "${GITHUB_REF_NAME}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and publish container
        id: publish
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          annotations: ${{ steps.metadata.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Attest container provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.publish.outputs.digest }}
          push-to-registry: true
